default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

# ─── Customer Profiles ───
# 고객 VM에 스킬을 배포할 때 프로필로 필터링
# /library deploy <profile> <ssh-target> 으로 사용
profiles:
  core:
    description: "모든 고객에게 기본 제공되는 필수 스킬"
    tags: [core]
  customer-basic:
    description: "비개발 고객용 (비즈니스 + 문서 + 검색)"
    tags: [core, business, docs]
  customer-full:
    description: "기술력 있는 고객용 (basic + dev)"
    tags: [core, business, docs, dev]
  internal:
    description: "Moat AI 내부 전용 (모든 스킬)"
    tags: [core, business, docs, dev, internal]

# ─── Customer Registry ───
# 어떤 고객이 어떤 프로필을 사용하는지 기록
customers:
  okusystem:
    profile: customer-basic
    ssh: toweradmin@20.41.101.188
    domain: okusystem.moatai.app
    skills_dir: ~/.claude/skills/

