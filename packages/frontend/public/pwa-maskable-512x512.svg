<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Maskable safe zone: 80% center area (10% padding each side) -->
  <rect width="512" height="512" fill="#0b0d12"/>
  <!-- Tower icon scaled to fit within safe zone (51.2 to 460.8) -->
  <g transform="translate(128, 90) scale(8)">
    <!-- Antenna -->
    <rect x="15" y="3" width="2" height="4" rx="1" fill="#f59e0b"/>
    <!-- Tower triangle body -->
    <polygon points="16,6 24,26 8,26" fill="#f59e0b"/>
    <!-- Base bar -->
    <rect x="7" y="26" width="18" height="2.5" rx="1.25" fill="#f59e0b"/>
    <!-- Center mast line -->
    <rect x="15.4" y="6" width="1.2" height="20" rx="0.6" fill="#0b0d12" opacity="0.25"/>
  </g>
</svg>
